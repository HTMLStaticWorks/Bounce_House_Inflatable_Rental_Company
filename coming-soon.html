<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | JumpJoy Rentals</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .soon-bg {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1574672280600-4accfa5b6f98?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
        }
        .countdown-item {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            padding: 20px;
            border-radius: 15px;
            min-width: 100px;
        }
        .countdown-value {
            font-size: 2.5rem;
            font-weight: 800;
            display: block;
        }
        .countdown-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="soon-bg p-4">
        <div class="container">
            <div class="d-flex justify-content-center align-items-center mb-4">
                <i class="bi bi-rocket-takeoff-fill me-2 fs-1 text-primary"></i>
                <h1 class="mb-0 fw-bold">JumpJoy</h1>
            </div>
            
            <h2 class="display-4 fw-bold mb-3">Something Big is Inflating!</h2>
            <p class="lead mb-5 opacity-75">We're getting ready for the summer season. Our new fleet arrives soon.</p>
            
            <div class="countdown">
                <div class="countdown-item">
                    <span class="countdown-value">14</span>
                    <span class="countdown-label">Days</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-value">08</span>
                    <span class="countdown-label">Hours</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-value">45</span>
                    <span class="countdown-label">Mins</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-value">12</span>
                    <span class="countdown-label">Secs</span>
                </div>
            </div>
            
            <div class="row justify-content-center mt-5">
                <div class="col-md-6">
                    <p class="mb-4">Be the first to know when we launch!</p>
                    <form class="input-group mb-4">
                        <input type="email" class="form-control form-control-lg bg-white border-0" placeholder="Enter your email">
                        <button class="btn btn-primary btn-lg" type="button">Notify Me</button>
                    </form>
                    <div class="d-flex justify-content-center gap-4 fs-4">
                        <a href="#" class="text-white"><i class="bi bi-facebook"></i></a>
                        <a href="#" class="text-white"><i class="bi bi-instagram"></i></a>
                        <a href="#" class="text-white"><i class="bi bi-twitter-x"></i></a>
                    </div>
                </div>
            </div>
            
            <div class="mt-5 pt-5">
                <a href="index.html" class="text-white opacity-50 small text-decoration-none"><i class="bi bi-arrow-left me-1"></i> Go back to Home</a>
            </div>
        </div>
    </div>

    <!-- Theme Toggle Fixed -->
    <div class="position-fixed top-0 end-0 p-3">
        <button id="themeToggle" class="btn btn-white shadow-sm rounded-circle p-2">
            <i class="bi bi-moon-stars-fill"></i>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
