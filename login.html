<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JumpJoy Rentals</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-card {
            max-width: 450px;
            width: 100%;
        }
        .auth-bg {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--tertiary-color);
        }
    </style>
</head>
<body>

    <div class="auth-bg">
        <div class="auth-card p-4">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="p-4 p-md-5">
                    <div class="text-center mb-5">
                        <a href="index.html" class="navbar-brand d-inline-flex align-items-center mb-3">
                            <i class="bi bi-rocket-takeoff-fill me-2 fs-2"></i>
                            <span class="fs-2">JumpJoy</span>
                        </a>
                        <h4 class="fw-bold">Welcome Back!</h4>
                        <p class="text-muted">Login to manage your bookings</p>
                    </div>
                    
                    <form action="dashboard.html">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control py-2" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <div class="d-flex justify-content-between">
                                <label class="form-label">Password</label>
                                <a href="#" class="small text-decoration-none">Forgot?</a>
                            </div>
                            <input type="password" class="form-control py-2" placeholder="••••••••" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label small" for="remember">Remember me</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 mb-4">Login</button>
                    </form>
                    
                    <div class="text-center mb-4">
                        <span class="text-muted small">Or login with</span>
                        <div class="d-flex justify-content-center gap-3 mt-3">
                            <button class="btn btn-outline-secondary px-3"><i class="bi bi-google"></i></button>
                            <button class="btn btn-outline-secondary px-3"><i class="bi bi-facebook"></i></button>
                            <button class="btn btn-outline-secondary px-3"><i class="bi bi-apple"></i></button>
                        </div>
                    </div>
                    
                    <div class="text-center">
                        <p class="small text-muted mb-0">Don't have an account? <a href="register.html" class="fw-bold text-decoration-none text-primary">Register</a></p>
                    </div>
                </div>
            </div>
            <div class="text-center mt-4">
                <a href="index.html" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left me-1"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <div class="position-fixed top-0 end-0 p-3 d-flex gap-2">
        <button id="themeToggle" class="btn btn-circle bg-white shadow-sm">
            <i class="bi bi-moon-stars-fill"></i>
        </button>
        <button id="rtlToggle" class="btn btn-circle bg-white shadow-sm">
            <span class="fw-bold" style="font-size: 0.7rem;">RTL</span>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
