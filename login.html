<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JumpJoy Rentals</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%233B82F6'><path d='M12.17 9.53c2.307-2.592 3.278-4.684 3.641-6.218.21-.887.214-1.58.16-2.064a2.783 2.783 0 0 0-.716-1.615 2.785 2.785 0 0 0-1.615-.716c-.484-.054-1.177-.05-2.064.16-1.534.363-3.626 1.334-6.218 3.641l-.32.285L1.45 3.52a.82.82 0 0 0-.732.44.82.82 0 0 0 .032.85l1.99 3.101-.285.32c-2.307 2.592-3.33 4.684-3.693 6.218a2.13 2.13 0 0 0 .588 1.812l.02.02.02.02a2.13 2.13 0 0 0 1.812.588c1.534-.363 3.626-1.386 6.218-3.693l.32-.285 3.101 1.99a.82.82 0 0 0 .85.032.82.82 0 0 0 .44-.732l-.485-3.515.285-.32zM12.148 2.47a2.031 2.031 0 1 1 .497.497 2.031 2.031 0 0 1-.497-.497z'/><path d='M7.005 12.1a1 1 0 1 0 1.923-.538c-.08-.287-.31-.593-.7-.987L7.48 9.826a.566.566 0 0 0-.73 0l-.747.747c-.394.39-.7.62-.987.7a1 1 0 1 0 .538 1.923l.135-.038a1.656 1.656 0 0 1 1.18 0l.135.038zm3.28-3.28a1 1 0 1 0 1.923-.538c-.08-.287-.31-.593-.7-.987l-.747-.747a.566.566 0 0 0-.73 0l-.747.747c-.394.39-.7.62-.987.7a1 1 0 1 0 .538 1.923l.135-.038a1.656 1.656 0 0 1 1.18 0l.135.038z'/></svg>">

    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-card {
            max-width: 450px;
            width: 100%;
        }
        .auth-bg {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--tertiary-color);
        }
    </style>
</head>
<body>

    <div class="auth-bg">
        <div class="auth-card p-4">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="p-4 p-md-5">
                    <div class="text-center mb-5">
                        <a href="index.html" class="navbar-brand d-inline-flex align-items-center mb-3">
                            <i class="bi bi-rocket-takeoff-fill me-2 fs-2"></i>
                            <span class="fs-2">JumpJoy</span>
                        </a>
                        <h4 class="fw-bold">Welcome Back!</h4>
                        <p class="text-muted">Login to manage your bookings</p>
                    </div>
                    
                    <form action="dashboard.html">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control py-2" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control py-2" placeholder="••••••••" required>
                        </div>
                        <div class="mb-3 d-flex justify-content-between align-items-center">
                            <div class="form-check mb-0">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label small" for="remember">Remember me</label>
                            </div>
                            <a href="#" class="small text-decoration-none">Forgot Password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 mb-4">Login</button>
                    </form>
                    
                    <div class="text-center mb-4">
                        <span class="text-muted small">Or login with</span>
                        <div class="d-flex justify-content-center gap-3 mt-3">
                            <button class="btn btn-outline-secondary px-3"><i class="bi bi-google"></i></button>
                            <button class="btn btn-outline-secondary px-3"><i class="bi bi-facebook"></i></button>
                            <button class="btn btn-outline-secondary px-3"><i class="bi bi-apple"></i></button>
                        </div>
                    </div>
                    
                    <div class="text-center">
                        <p class="small text-muted mb-0">Don't have an account? <a href="register.html" class="fw-bold text-decoration-none text-primary">Register</a></p>
                    </div>
                </div>
            </div>
            <div class="text-center mt-4">
                <a href="index.html" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left me-1"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <div class="position-fixed top-0 end-0 p-3 d-flex gap-2">
        <button class="btn btn-circle bg-white shadow-sm theme-toggle">
            <i class="bi bi-moon-stars-fill"></i>
        </button>
        <button class="btn btn-circle bg-white shadow-sm rtl-toggle">
            <span class="fw-bold" style="font-size: 0.7rem;">RTL</span>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
