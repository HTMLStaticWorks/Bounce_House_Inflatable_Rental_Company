<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | JumpJoy Rentals</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-card {
            max-width: 500px;
            width: 100%;
        }
        .auth-bg {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="auth-bg">
        <div class="auth-card p-4">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="p-4 p-md-5">
                    <div class="text-center mb-5">
                        <a href="index.html" class="navbar-brand d-inline-flex align-items-center mb-3">
                            <i class="bi bi-rocket-takeoff-fill me-2 fs-2 text-primary"></i>
                            <span class="fs-2 text-primary">JumpJoy</span>
                        </a>
                        <h4 class="fw-bold">Create Account</h4>
                        <p class="text-muted">Join the fun today!</p>
                    </div>
                    
                    <form action="dashboard.html">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" placeholder="John" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" placeholder="Doe" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" placeholder="name@example.com" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" placeholder="••••••••" required>
                            </div>
                            <div class="col-md-12">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="terms" required>
                                    <label class="form-check-label small" for="terms">I agree to the <a href="#">Terms & Conditions</a></label>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <button type="submit" class="btn btn-primary w-100 py-2 mt-2">Sign Up</button>
                            </div>
                        </div>
                    </form>
                    
                    <hr class="my-4">
                    
                    <div class="text-center">
                        <p class="small text-muted mb-0">Already have an account? <a href="login.html" class="fw-bold text-decoration-none text-primary">Login</a></p>
                    </div>
                </div>
            </div>
            <div class="text-center mt-4">
                <a href="index.html" class="text-white text-decoration-none small"><i class="bi bi-arrow-left me-1"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <div class="position-fixed top-0 end-0 p-3 d-flex gap-2">
        <button id="themeToggle" class="btn btn-circle bg-white shadow-sm">
            <i class="bi bi-moon-stars-fill"></i>
        </button>
        <button id="rtlToggle" class="btn btn-circle bg-white shadow-sm">
            <span class="fw-bold" style="font-size: 0.7rem;">RTL</span>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
