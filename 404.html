<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | JumpJoy</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .error-bg {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--tertiary-color);
        }
    </style>
</head>
<body>

    <div class="error-bg p-4">
        <div class="container">
            <div class="display-1 fw-bold text-primary mb-3">404</div>
            <h2 class="fw-bold mb-4">Oops! This Bounce House is Deflated</h2>
            <p class="lead text-muted mb-5">The page you're looking for doesn't exist or has been moved to a new location.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="index.html" class="btn btn-primary btn-lg px-4">Back to Home</a>
                <a href="contact.html" class="btn btn-outline-secondary btn-lg px-4">Report Issue</a>
            </div>
            
            <div class="mt-5 pt-5 opacity-50">
                <i class="bi bi-rocket-takeoff-fill fs-1"></i>
            </div>
        </div>
    </div>

    <!-- Theme Toggle Fixed -->
    <div class="position-fixed top-0 end-0 p-3">
        <button id="themeToggle" class="btn btn-white shadow-sm rounded-circle p-2">
            <i class="bi bi-moon-stars-fill"></i>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
